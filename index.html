<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Check-up de Performance HERO: descubra como sua energia, corpo, rotina e capacidade de evolução estão hoje."
    />
    <title>Check-up de Performance HERO</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
<style>
:root {
  --bg: #070812;
  --bg-2: #0a0a1a;
  --panel: rgba(17, 20, 38, 0.82);
  --panel-strong: #111426;
  --line: rgba(255, 255, 255, 0.11);
  --muted: #a0a3b2;
  --text: #ffffff;
  --blue: #007bff;
  --blue-2: #48a1ff;
  --green: #45d483;
  --amber: #f2b84b;
  --red: #ff6678;
  --shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
  color-scheme: dark;
  font-family: "Manrope", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html {
  min-height: 100%;
  background: var(--bg);
  -webkit-text-size-adjust: 100%;
}

body {
  min-height: 100svh;
  margin: 0;
  color: var(--text);
  background:
    linear-gradient(180deg, rgba(7, 8, 18, 0.2), var(--bg) 780px),
    var(--bg);
}

button,
input,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100svh;
  display: flex;
  flex-direction: column;
}

.topbar {
  position: fixed;
  inset: 0 0 auto 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px clamp(16px, 4vw, 44px);
  background: linear-gradient(180deg, rgba(7, 8, 18, 0.9), rgba(7, 8, 18, 0));
}

.brand,
.ghost-link,
.footer button {
  border: 0;
  color: var(--text);
  background: transparent;
}

.brand {
  display: inline-flex;
  align-items: center;
  padding: 0;
  text-align: left;
}

.brand strong,
.brand small {
  display: block;
  letter-spacing: 0;
}

.brand strong {
  font-size: 1.22rem;
}

.brand small {
  color: var(--muted);
  font-size: 0.73rem;
}

.ghost-link {
  min-height: 40px;
  padding: 0 14px;
  border: 0;
  border-radius: 8px;
  color: #dfe7ff;
  background: rgba(255, 255, 255, 0.04);
}

main {
  flex: 1;
}

.hero {
  min-height: 100svh;
  display: grid;
  align-items: center;
  padding: 104px clamp(18px, 6vw, 80px) 54px;
  background:
    linear-gradient(90deg, rgba(7, 8, 18, 0.96) 0%, rgba(7, 8, 18, 0.82) 42%, rgba(7, 8, 18, 0.3) 78%),
    linear-gradient(180deg, rgba(7, 8, 18, 0.15), var(--bg) 96%),
    url("./assets/hero-performance.png") center right / cover no-repeat;
}

.hero-content {
  width: min(700px, 100%);
}

.hero-grid {
  width: min(1180px, 100%);
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(320px, 420px);
  gap: clamp(26px, 5vw, 68px);
  align-items: center;
}

.access-card {
  position: relative;
  overflow: hidden;
  border: 0;
  border-radius: 8px;
  padding: clamp(20px, 4vw, 30px);
  background:
    linear-gradient(145deg, rgba(255, 255, 255, 0.105), rgba(255, 255, 255, 0.035) 44%, rgba(0, 123, 255, 0.07)),
    rgba(9, 12, 28, 0.84);
  box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38), inset 0 1px 0 rgba(255, 255, 255, 0.1);
  backdrop-filter: blur(22px) saturate(1.1);
  transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
}

.access-card::before {
  content: "";
  position: absolute;
  inset: -36% -18%;
  z-index: 0;
  background:
    linear-gradient(115deg, transparent 0 28%, rgba(255, 255, 255, 0.12) 42%, transparent 58%),
    linear-gradient(22deg, rgba(0, 123, 255, 0.12), transparent 44%);
  filter: blur(28px);
  opacity: 0.48;
  transform: translateX(-18%);
  transition: opacity 220ms ease, transform 360ms ease;
}

.access-card > * {
  position: relative;
  z-index: 1;
}

@media (hover: hover) and (pointer: fine) {
  .access-card:hover {
    transform: translateY(-4px);
    background:
      linear-gradient(145deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.045) 44%, rgba(0, 123, 255, 0.11)),
      rgba(9, 12, 28, 0.9);
    box-shadow: 0 34px 96px rgba(0, 0, 0, 0.46), 0 18px 52px rgba(0, 123, 255, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.12);
  }

  .access-card:hover::before {
    opacity: 0.68;
    transform: translateX(0);
  }
}

.hero .button,
.hero .ghost-inline {
  border: 0;
}

.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 20px;
  color: #c9d9ff;
  font-size: 0.82rem;
  font-weight: 700;
  text-transform: uppercase;
}

.eyebrow::before {
  content: "";
  width: 32px;
  height: 2px;
  background: var(--blue);
}

h1,
h2,
h3,
p {
  margin-top: 0;
}

h1 {
  max-width: 820px;
  margin-bottom: 22px;
  font-size: clamp(2.42rem, 7vw, 5.7rem);
  line-height: 0.96;
  letter-spacing: 0;
}

h2 {
  margin-bottom: 14px;
  font-size: clamp(1.8rem, 5vw, 3.4rem);
  line-height: 1.02;
  letter-spacing: 0;
}

h3 {
  margin-bottom: 10px;
  font-size: 1.08rem;
}

.lead {
  max-width: 680px;
  color: #d4d8e8;
  font-size: clamp(1rem, 2.4vw, 1.24rem);
  line-height: 1.68;
}

.cta-row {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  margin-top: 34px;
}

.button {
  min-height: 54px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 0 22px;
  border: 1px solid transparent;
  border-radius: 8px;
  font-weight: 800;
  text-decoration: none;
  transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
}

.button:active {
  transform: translateY(1px);
}

.button.primary {
  color: #fff;
  background: var(--blue);
  box-shadow: 0 14px 34px rgba(0, 123, 255, 0.28);
}

.button.secondary {
  color: #e7efff;
  border-color: var(--line);
  background: rgba(255, 255, 255, 0.06);
}

.button.full {
  width: 100%;
}

.button:disabled {
  cursor: not-allowed;
  opacity: 0.48;
  box-shadow: none;
}

.ghost-inline {
  min-height: 38px;
  border: 0;
  color: var(--muted);
  background: transparent;
  text-decoration: underline;
  text-underline-offset: 4px;
}

.trust-list {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin: 22px 0 0;
  padding: 0;
  list-style: none;
  color: #c7ccd9;
  font-size: 0.92rem;
}

.trust-list li {
  padding: 7px 10px;
  border: 0;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.04);
}

.workspace {
  min-height: 100svh;
  display: grid;
  place-items: center;
  padding: 104px clamp(16px, 4vw, 44px) 54px;
}

.quiz-frame {
  width: min(1120px, 100%);
}

.progress-wrap {
  margin-bottom: 26px;
}

.progress-meta {
  display: flex;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 10px;
  color: var(--muted);
  font-size: 0.86rem;
}

.progress-track {
  height: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
}

.progress-fill {
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: linear-gradient(90deg, var(--blue), var(--blue-2));
  transition: width 320ms ease;
}

.panel,
.question-card,
.result-card,
.admin-table-wrap {
  border: 0;
  border-radius: 8px;
  background: var(--panel);
  box-shadow: var(--shadow);
  backdrop-filter: blur(18px);
}

.panel,
.question-card {
  padding: clamp(22px, 5vw, 46px);
}

.question-card {
  animation: rise 260ms ease both;
}

.quiz-stage {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
  align-items: stretch;
}

@keyframes rise {
  from {
    opacity: 0;
    transform: translateY(10px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.question-label {
  margin-bottom: 14px;
  color: var(--blue-2);
  font-size: 0.83rem;
  font-weight: 800;
  text-transform: uppercase;
}

.support {
  color: var(--muted);
  line-height: 1.65;
}

.options {
  display: grid;
  gap: 12px;
  margin-top: 28px;
}

.option {
  width: 100%;
  min-height: 66px;
  display: grid;
  grid-template-columns: 28px 1fr;
  align-items: center;
  gap: 14px;
  padding: 16px;
  border: 0;
  border-radius: 8px;
  color: var(--text);
  text-align: left;
  background: rgba(255, 255, 255, 0.045);
  transition: background 180ms ease, transform 180ms ease, box-shadow 180ms ease;
}

.option:hover,
.option:focus-visible {
  background: rgba(0, 123, 255, 0.11);
  box-shadow: inset 0 0 0 1px rgba(72, 161, 255, 0.28);
  outline: 0;
}

.option.selected {
  background: rgba(0, 123, 255, 0.16);
  box-shadow: inset 0 0 0 1px rgba(72, 161, 255, 0.36);
}

.option-dot {
  width: 24px;
  height: 24px;
  border: 2px solid rgba(255, 255, 255, 0.28);
  border-radius: 999px;
}

.option.selected .option-dot {
  border-color: var(--blue-2);
  background: radial-gradient(circle, var(--blue-2) 0 42%, transparent 46%);
}

.option-text strong {
  display: block;
  margin-bottom: 3px;
}

.option-text small {
  color: var(--muted);
  line-height: 1.45;
}

.nav-row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-top: 24px;
}

.nav-row:has(.button:only-child) {
  justify-content: flex-start;
}

.answer-feedback {
  margin-top: 18px;
  padding: 12px 14px;
  border: 0;
  border-radius: 8px;
  color: #dfffea;
  background: rgba(69, 212, 131, 0.08);
  font-size: 0.9rem;
  font-weight: 700;
}

.micro {
  color: var(--muted);
  font-size: 0.86rem;
  line-height: 1.5;
}

.form-grid {
  display: grid;
  gap: 14px;
  margin-top: 24px;
}

.field label {
  display: block;
  margin-bottom: 8px;
  color: #e4e8f4;
  font-size: 0.9rem;
  font-weight: 700;
}

.field input,
.open-answer textarea {
  width: 100%;
  min-height: 52px;
  padding: 0 14px;
  border: 1px solid rgba(255, 255, 255, 0.13);
  border-radius: 8px;
  color: var(--text);
  background: rgba(255, 255, 255, 0.06);
  outline: 0;
}

.field input:focus,
.open-answer textarea:focus {
  border-color: var(--blue-2);
}

.form-grid.compact {
  gap: 12px;
}

.open-answer {
  display: grid;
  gap: 10px;
  margin-top: 26px;
}

.open-answer textarea {
  min-height: 150px;
  padding: 14px;
  resize: vertical;
  line-height: 1.5;
}

.scale-card {
  display: grid;
  gap: 18px;
  margin-top: 28px;
  padding: 22px;
  border: 0;
  border-radius: 8px;
  background:
    linear-gradient(135deg, rgba(0, 123, 255, 0.16), rgba(255, 255, 255, 0.04)),
    rgba(255, 255, 255, 0.04);
}

.scale-value {
  display: flex;
  align-items: baseline;
  gap: 6px;
}

.scale-value strong {
  font-size: clamp(3rem, 12vw, 5.8rem);
  line-height: 0.9;
}

.scale-value span {
  color: var(--muted);
  font-weight: 800;
}

.scale-card input[type="range"] {
  width: 100%;
  accent-color: var(--blue);
}

.scale-labels {
  display: flex;
  justify-content: space-between;
  gap: 14px;
  color: var(--muted);
  font-size: 0.86rem;
  font-weight: 700;
}

.evidence-card {
  overflow: hidden;
  position: relative;
  min-height: 330px;
  display: grid;
  border: 0;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.05);
  box-shadow: var(--shadow);
}

.evidence-card img {
  position: absolute;
  inset: 0;
  z-index: 0;
  width: 100%;
  height: 100%;
  min-height: 230px;
  display: block;
  object-fit: cover;
  object-position: center;
}

.evidence-body {
  position: relative;
  z-index: 2;
  width: min(520px, 88%);
  align-self: end;
  display: grid;
  gap: 10px;
  padding: clamp(18px, 4vw, 30px);
  margin: clamp(14px, 3vw, 26px);
  border-radius: 8px;
  background: linear-gradient(135deg, rgba(7, 8, 18, 0.9), rgba(7, 8, 18, 0.64));
  box-shadow: 0 18px 54px rgba(0, 0, 0, 0.34);
  backdrop-filter: blur(12px);
}

.evidence-card::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  background:
    linear-gradient(90deg, rgba(7, 8, 18, 0.72), rgba(7, 8, 18, 0.16) 54%, rgba(7, 8, 18, 0.48)),
    linear-gradient(180deg, rgba(7, 8, 18, 0.08), rgba(7, 8, 18, 0.78));
}

.evidence-kicker {
  color: var(--blue-2);
  font-size: 0.76rem;
  font-weight: 900;
  text-transform: uppercase;
}

.evidence-body strong {
  font-size: clamp(3.1rem, 8vw, 5.6rem);
  line-height: 0.95;
}

.evidence-type-activity .evidence-body {
  justify-self: start;
}

.evidence-type-sleep .evidence-body {
  justify-self: end;
  align-self: center;
}

.evidence-type-body .evidence-body {
  justify-self: center;
}

.evidence-type-consistency .evidence-body {
  justify-self: start;
  align-self: start;
}

.evidence-body p,
.evidence-body small {
  margin: 0;
  color: #dbe2f3;
  line-height: 1.45;
}

.evidence-body small {
  color: var(--muted);
}

.evidence-body a {
  color: #d7e7ff;
  font-size: 0.84rem;
  font-weight: 800;
}

.check {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 12px;
  align-items: start;
  color: #d8ddea;
  line-height: 1.45;
}

.check input {
  width: 20px;
  height: 20px;
  margin: 2px 0 0;
  accent-color: var(--blue);
}

.processing-list {
  display: grid;
  gap: 12px;
  margin: 28px 0 0;
  padding: 0;
  list-style: none;
}

.processing-list li {
  display: flex;
  gap: 12px;
  align-items: center;
  color: #dce4f8;
}

.pulse {
  width: 10px;
  height: 10px;
  border-radius: 999px;
  background: var(--blue);
  box-shadow: 0 0 0 8px rgba(0, 123, 255, 0.12);
}

.result-layout {
  width: min(1120px, 100%);
  display: grid;
  grid-template-columns: 0.9fr 1.1fr;
  gap: 18px;
}

.result-card {
  padding: clamp(20px, 4vw, 34px);
}

.score-ring {
  width: min(260px, 72vw);
  aspect-ratio: 1;
  display: grid;
  place-items: center;
  margin: 22px auto;
  border-radius: 50%;
  background:
    radial-gradient(circle at center, var(--panel-strong) 0 58%, transparent 59%),
    conic-gradient(var(--blue) calc(var(--score) * 1%), rgba(255, 255, 255, 0.09) 0);
}

.score-ring strong {
  display: block;
  font-size: clamp(3rem, 12vw, 4.7rem);
  line-height: 0.9;
}

.score-ring span {
  color: var(--muted);
  font-weight: 700;
}

.classification {
  display: inline-flex;
  margin-bottom: 16px;
  padding: 8px 10px;
  border: 0;
  border-radius: 8px;
  color: #dbe9ff;
  background: rgba(0, 123, 255, 0.1);
  font-weight: 800;
}

.metric-list {
  display: grid;
  gap: 14px;
  margin-top: 18px;
}

.metric {
  display: grid;
  gap: 6px;
}

.metric-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  color: #e7ebf8;
  font-size: 0.92rem;
  font-weight: 800;
}

.metric-track {
  height: 8px;
  overflow: hidden;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.08);
}

.metric-track span {
  display: block;
  width: var(--metric);
  height: 100%;
  border-radius: inherit;
  background: var(--blue-2);
}

.diagnosis {
  counter-reset: item;
  display: grid;
  gap: 12px;
  margin: 18px 0 0;
  padding: 0;
  list-style: none;
}

.diagnosis li {
  counter-increment: item;
  display: grid;
  grid-template-columns: 34px 1fr;
  gap: 12px;
  color: #dfe5f3;
  line-height: 1.55;
}

.diagnosis li::before {
  content: counter(item);
  width: 28px;
  height: 28px;
  display: grid;
  place-items: center;
  border-radius: 8px;
  color: #fff;
  background: rgba(0, 123, 255, 0.52);
  font-size: 0.82rem;
  font-weight: 900;
}

.action-list,
.benefit-list {
  display: grid;
  gap: 10px;
  padding-left: 20px;
  color: #e1e6f3;
  line-height: 1.55;
}

.offer-band {
  margin-top: 18px;
  padding: 20px;
  border: 0;
  border-radius: 8px;
  background: rgba(0, 123, 255, 0.08);
}

.footer {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 14px;
  padding: 18px;
}

.footer button {
  color: var(--muted);
  text-decoration: underline;
  text-underline-offset: 4px;
}

.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 40;
  max-width: min(360px, calc(100vw - 36px));
  padding: 14px 16px;
  border: 0;
  border-radius: 8px;
  color: #fff;
  background: #14182b;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(12px);
  pointer-events: none;
  transition: opacity 180ms ease, transform 180ms ease;
}

.toast.visible {
  opacity: 1;
  transform: translateY(0);
}

.admin-grid {
  width: min(1180px, 100%);
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin: 24px 0;
}

.stat {
  padding: 18px;
  border: 0;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.05);
}

.stat strong {
  display: block;
  font-size: 2rem;
}

.admin-table-wrap {
  overflow: auto;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 760px;
}

th,
td {
  padding: 13px 14px;
  border-bottom: 1px solid var(--line);
  text-align: left;
  vertical-align: top;
}

th {
  color: #dbe6ff;
  font-size: 0.82rem;
  text-transform: uppercase;
}

td {
  color: #d8deed;
  font-size: 0.92rem;
}

@media (max-width: 820px) {
  body {
    overflow-x: hidden;
  }

  .topbar {
    padding: 10px 14px;
    background: rgba(7, 8, 18, 0.82);
    backdrop-filter: blur(14px);
  }

  .brand small {
    display: none;
  }

  .brand strong {
    font-size: 1.08rem;
  }

  .ghost-link {
    min-height: 36px;
    padding: 0 10px;
    font-size: 0.86rem;
  }

  .hero {
    align-items: end;
    min-height: 100svh;
    padding: 78px 14px 24px;
    background:
      linear-gradient(180deg, rgba(7, 8, 18, 0.32) 0%, rgba(7, 8, 18, 0.84) 44%, var(--bg) 96%),
      url("./assets/hero-performance.png") 62% center / cover no-repeat;
  }

  .hero-grid,
  .quiz-stage {
    grid-template-columns: 1fr;
  }

  .access-card {
    background: rgba(9, 12, 28, 0.9);
    padding: 18px;
  }

  .cta-row,
  .nav-row {
    display: grid;
  }

  .button {
    width: 100%;
    min-height: 52px;
  }

  .result-layout {
    grid-template-columns: 1fr;
  }

  .workspace {
    align-items: start;
    padding: 78px 14px 30px;
  }

  .quiz-frame {
    width: 100%;
  }

  .progress-wrap {
    margin-bottom: 14px;
  }

  .panel,
  .question-card,
  .result-card {
    box-shadow: 0 18px 52px rgba(0, 0, 0, 0.28);
  }

  .question-card {
    padding: 20px;
  }

  .question-card h2,
  .panel h2,
  .result-card h2 {
    font-size: clamp(1.55rem, 8vw, 2.25rem);
    line-height: 1.08;
  }

  .support,
  .lead {
    font-size: 0.98rem;
    line-height: 1.56;
  }

function getActiveQuestions() {
  return questions.filter((question) => !question.profile || question.profile === state.profile);
}

function renderQuestion() {
  const activeQuestions = getActiveQuestions();
  const question = activeQuestions[state.current];

  if (!question) {
    renderProcessing();
    return;
  }

  const answer = state.answers[question.id] || null;
  const selected = answer && answer.value !== undefined && answer.value !== null ? answer.value : null;
  const canContinue = Boolean(answer) || question.kind === "scale";
  screen.innerHTML = `
    <section class="workspace">
      <div class="quiz-frame">
        ${progressMarkup(state.current + 1, question.label)}
        <div class="quiz-stage">
          ${evidenceMarkup(question)}
          <article class="question-card">
            <p class="question-label">${question.label}</p>
            <h2>${question.title}</h2>
            ${question.support ? `<p class="support">${question.support}</p>` : ""}
            ${questionInputMarkup(question, selected, answer)}
            ${answer ? `<div class="answer-feedback">Resposta registrada. O próximo bloco ajusta o seu mapa HERO.</div>` : ""}
            <div class="nav-row">
              <button class="button secondary" type="button" id="backQuestion">Voltar</button>
              ${question.options ? "" : `<button class="button primary" type="button" id="nextQuestion" ${!canContinue ? "disabled" : ""}>Continuar</button>`}
            </div>
          </article>
        </div>
      </div>
    </section>
  `;

  document.querySelectorAll(".option").forEach((button) => {
    button.addEventListener("click", () => {
      const index = Number(button.dataset.index);
      const option = question.options[index];
      const previousProfile = state.profile;
      state.answers[question.id] = {
        question: question.title,
        answer: option.text,
        score: option.score,
        tag: option.tag || null,
        value: option.value !== undefined && option.value !== null ? option.value : index,
      };
      if (question.id === "profile") {
        state.profile = option.value;
        if (previousProfile && previousProfile !== option.value) {
          clearAnswersFromOtherProfile(option.value);
        }
      }
      window.setTimeout(() => {
        state.current += 1;
        renderQuestion();
      }, 180);
    });
  });

  const scaleInput = document.querySelector("#scaleAnswer");
  if (scaleInput) {
    const valueLabel = document.querySelector("#scaleValue");
    scaleInput.addEventListener("input", () => {
      valueLabel.textContent = scaleInput.value;
    });
    scaleInput.addEventListener("change", () => {
      const value = Number(scaleInput.value);
      const max = Number(question.max || 10);
      state.answers[question.id] = {
        question: question.title,
        answer: `${value}/${max}`,
        score: scaleScore(question, value),
        tag: question.tag || null,
        value,
      };
      renderQuestion();
    });
  }

  const textInput = document.querySelector("#textAnswer");
  if (textInput) {
    textInput.addEventListener("input", () => {
      const text = textInput.value.trim();
      const minLength = question.minLength || 3;
      if (text.length >= minLength) {
        state.answers[question.id] = {
          question: question.title,
          answer: text,
          score: question.score || 50,
          tag: question.tag || null,
          value: text,
        };
      } else {
        delete state.answers[question.id];
      }
      document.querySelector("#nextQuestion").disabled = text.length < minLength;
    });
  }

  document.querySelector("#backQuestion").addEventListener("click", goBack);
  const nextButton = document.querySelector("#nextQuestion");
  if (nextButton) {
    nextButton.addEventListener("click", () => {
      if (question.kind === "scale" && !state.answers[question.id]) {
        const scale = document.querySelector("#scaleAnswer");
        const value = Number(scale.value);
        const max = Number(question.max || 10);
        state.answers[question.id] = {
          question: question.title,
          answer: `${value}/${max}`,
          score: scaleScore(question, value),
          tag: question.tag || null,
          value,
        };
      }
      state.current += 1;
      renderQuestion();
    });
  }
}

function questionInputMarkup(question, selected, answer) {
  if (question.kind === "scale") {
    const max = question.max || 10;
    const value = answer && answer.value !== undefined && answer.value !== null ? answer.value : Math.round(max / 2);
    return `
      <div class="scale-card">
        <div class="scale-value"><strong id="scaleValue">${value}</strong><span>/${max}</span></div>
        <input id="scaleAnswer" type="range" min="0" max="${max}" step="1" value="${value}" aria-label="${question.title}" />
        <div class="scale-labels">
          <span>${question.minLabel || "Baixo"}</span>
          <span>${question.maxLabel || "Alto"}</span>
        </div>
      </div>
    `;
  }

  if (question.kind === "text") {
    return `
      <div class="open-answer">
        <textarea id="textAnswer" rows="5" maxlength="280" placeholder="${question.placeholder || ""}">${answer && answer.answer ? answer.answer : ""}</textarea>
        <p class="micro">Resposta aberta. Mínimo de ${question.minLength || 3} caracteres.</p>
      </div>
    `;
  }

  return `
    <div class="options" role="radiogroup" aria-label="${question.title}">
      ${question.options
        .map((option, index) => optionMarkup(question, option, index, selected))
        .join("")}
    </div>
  `;
}

function clearAnswersFromOtherProfile(profile) {
  Object.keys(state.answers).forEach((answerId) => {
    const matchedQuestion = questions.find((item) => item.id === answerId);
    if (matchedQuestion && matchedQuestion.profile && matchedQuestion.profile !== profile) {
      delete state.answers[answerId];
    }
  });
}

function optionMarkup(question, option, index, selected) {
  const value = option.value !== undefined && option.value !== null ? option.value : index;
  const isSelected = selected === value;
  return `
    <button class="option ${isSelected ? "selected" : ""}" type="button" data-index="${index}" role="radio" aria-checked="${isSelected}">
      <span class="option-dot" aria-hidden="true"></span>
      <span class="option-text">
        <strong>${option.text}</strong>
        ${option.detail ? `<small>${option.detail}</small>` : ""}
      </span>
    </button>
  `;
}

function evidenceMarkup(question) {
  if (question.id === "profile") return "";
  const group = evidenceCards[question.evidence] || evidenceCards.activity;
  const profile = state.profile === "female" ? "female" : "male";
  const card = group[profile];
  return `
    <aside class="evidence-card evidence-type-${question.evidence || "activity"}">
      <img src="${card.image}" alt="" loading="lazy" />
      <div class="evidence-body">
        <span class="evidence-kicker">Dado real</span>
        <strong>${card.stat}</strong>
        <p>${card.title}</p>
        <small>${card.note}</small>
        <a href="${card.url}" target="_blank" rel="noreferrer">${card.source}</a>
      </div>
    </aside>
  `;
}

function scaleScore(question, value) {
  if (question.scoreMap === "trainingDays") {
    return clamp(Math.round((value / Number(question.max || 6)) * 78 + 12), 0, 100);
  }
  return clamp(value * 10, 0, 100);
}

function goBack() {
  if (state.current <= 0) {
    renderIntro();
    return;
  }
  state.current -= 1;
  renderQuestion();
}

function progressMarkup(step, label) {
  const total = getActiveQuestions().length || 1;
  const pct = Math.min(100, Math.round((step / total) * 100));
  return `
    <div class="progress-wrap" aria-label="Progresso do quiz">
      <div class="progress-meta">
        <span>${label}</span>
        <span>${pct}% concluído</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width: ${pct}%"></div></div>
    </div>
  `;
}

async function enrichResultWithAi(result) {
  try {
    const response = await fetch("/.netlify/functions/diagnosis", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        lead: state.lead,
        profile: state.profile,
        answers: state.answers,
        result,
      }),
    });

    if (!response.ok) return result;

    const ai = await response.json();
    return {
      ...result,
      diagnosis: Array.isArray(ai.diagnosis) && ai.diagnosis.length ? ai.diagnosis.slice(0, 5) : result.diagnosis,
      actions: Array.isArray(ai.actions) && ai.actions.length ? ai.actions.slice(0, 5) : result.actions,
      aiSummary: ai.summary || "",
      aiGenerated: Boolean(ai.aiGenerated),
    };
  } catch {
    return result;
  }
}

function calculateResult(isPreview) {
  const answerList = Object.entries(state.answers)
    .filter(([key]) => key !== "profile")
    .map(([, answer]) => answer);
  const scores = answerList.map((answer) => Number(answer.score || 0));
  const average = scores.length ? Math.round(scores.reduce((sum, score) => sum + score, 0) / scores.length) : 0;
  const penalty = isPreview ? 0 : riskPenalty(answerList);
  const overall = clamp(Math.round(average - penalty), 0, 100);
  const tags = answerList.map((answer) => answer.tag).filter(Boolean);

  const metricScores = {
    "Energia": dimensionScore(["wake_up", "m_energy", "f_energy"], average),
    "Composição corporal": dimensionScore(["body_feeling", "m_composition", "f_body"], average),
    "Força": dimensionScore(["m_strength", "goal_main"], average),
    "Recuperação": dimensionScore(["m_recovery", "f_recovery", "m_power"], average),
    "Consistência": dimensionScore(["routine", "attempts", "days_training", "support_need"], average),
    "Confiança corporal": dimensionScore(["mirror", "m_confidence", "f_selfesteem", "f_identity"], average),
    "Capacidade de evolução": dimensionScore(["blocker", "time_training", "goal_main", "support_need"], average),
  };

  const classification = classify(overall);
  return {
    overall,
    metrics: metricScores,
    classification,
    tags,
    diagnosis: buildDiagnosis(overall, metricScores, tags),
    actions: buildActions(metricScores, tags),
    createdAt: new Date().toISOString(),
  };
}

function dimensionScore(ids, fallback) {
  const values = ids
    .map((id) => state.answers[id] ? state.answers[id].score : undefined)
    .filter((value) => typeof value === "number");
  if (!values.length) return clamp(Math.round(fallback), 0, 100);
  return clamp(Math.round(values.reduce((sum, score) => sum + score, 0) / values.length), 0, 100);
}

function riskPenalty(answerList) {
  const lowAnswers = answerList.filter((answer) => Number(answer.score) < 35).length;
  return Math.min(12, lowAnswers * 2);
}

function classify(score) {
  if (score >= 82) {
    return {
      title: "Performance em Expansão",
      description:
        "Você já tem bons fundamentos. O próximo salto depende de estratégia, progressão e refinamento do acompanhamento.",
    };
  }
  if (score >= 62) {
    return {
      title: "Performance Instável",
      description:
        "Existe potencial claro, mas sua rotina ainda oscila o suficiente para frear evolução e gerar frustração.",
    };
  }
  if (score >= 42) {
    return {
      title: "Performance Comprometida",
      description:
        "Seu corpo provavelmente não está sem saída; ele está sem um sistema que respeite sua realidade e conduza consistência.",
    };
  }
  return {
    title: "Performance em Alerta",
    description:
      "Os sinais de cansaço, desconexão corporal e baixa continuidade pedem uma intervenção simples, realista e acompanhada.",
  };
}

function buildDiagnosis(score, metrics, tags) {
  const weakest = Object.entries(metrics).sort((a, b) => a[1] - b[1])[0];
  const strongest = Object.entries(metrics).sort((a, b) => b[1] - a[1])[0];
  const blocker = tags[0] || "continuidade";
  return [
    `Identificamos que ${weakest[0].toLowerCase()} é hoje o ponto que mais limita seu Índice HERO, com ${weakest[1]}/100.`,
    `Na vida real, isso costuma aparecer como intenção sem execução, oscilação de energia e sensação de estar sempre recomeçando.`,
    `O principal risco é transformar cansaço em identidade: você passa a funcionar no mínimo e chama isso de normal.`,
    `Seu potencial está em ${strongest[0].toLowerCase()}. Esse é o ponto de apoio para reconstruir rotina sem depender de motivação.`,
    `O próximo passo é um protocolo enxuto, com treino possível, ajustes semanais e acompanhamento humano para remover o bloqueio de ${blocker}.`,
  ];
}

function buildActions(metrics, tags) {
  const weakest = Object.entries(metrics).sort((a, b) => a[1] - b[1]).slice(0, 2).map(([name]) => name);
  const actions = [
    "Estabelecer três sessões semanais de força, mesmo que curtas, com progressão visível.",
    "Definir um horário mínimo de execução para reduzir o intervalo entre intenção e ação.",
    "Organizar alimentação e hidratação primeiro nos dias mais difíceis, não apenas nos dias perfeitos.",
    "Criar uma métrica simples de energia, sono e treino para ajustar o plano sem culpa.",
    "Usar acompanhamento semanal para corrigir rota antes que a rotina vire abandono.",
  ];

  if (weakest.includes("Recuperação")) actions[2] = "Proteger sono, pausa e recuperação como parte do treino, não como prêmio.";
  if (weakest.includes("Confiança corporal")) actions[3] = "Registrar evolução por força, constância e medidas, não apenas por espelho ou comparação.";
  if (tags.includes("tempo")) actions[0] = "Começar com treinos objetivos de 30 a 40 minutos, desenhados para semanas reais.";
  return actions;
}

  screen.innerHTML = `

        <article class="result-card">
          <p class="question-label">Resultado</p>
          <h2>Índice HERO</h2>
          <div class="score-ring" style="--score: ${result.overall}">
            <div>
              <strong>${result.overall}</strong>
              <span>/100</span>
            </div>
          </div>
          <span class="classification">${result.classification.title}</span>
          <p class="support">${result.classification.description}</p>
          <div class="metric-list">
            ${dimensions.map((name) => metricMarkup(name, result.metrics[name])).join("")}
          </div>
        </article>

        <div>
          <article class="result-card">
            <p class="question-label">Diagnóstico com IA</p>
            <h2>${state.lead.firstName ? `${state.lead.firstName}, este é o seu mapa inicial.` : "Este é o seu mapa inicial."}</h2>
            <span class="ai-badge">${result.aiGenerated ? "Análise individual gerada por IA" : "Análise local pronta para IA"}</span>
            <ol class="diagnosis">
              ${result.diagnosis.map((item) => `<li>${item}</li>`).join("")}
            </ol>
            ${result.aiSummary ? `<p class="support">${result.aiSummary}</p>` : ""}
            <p class="micro">
              Este indicador compara seus hábitos, energia, recuperação e consistência com padrões de performance.
              Ele não representa idade biológica ou diagnóstico médico.
            </p>
          </article>

          <article class="result-card" style="margin-top: 18px">
            <p class="question-label">Plano de ação gratuito</p>
            <h2>Comece pelo que destrava execução.</h2>
            <ul class="action-list">
              ${result.actions.map((action) => `<li>${action}</li>`).join("")}
            </ul>
            <div class="offer-band">
              <h3>Você já sabe o que está bloqueando sua evolução. Agora precisa decidir se continuará tentando sozinho.</h3>
              <p>
                O Protocolo HERO transforma as informações do seu Check-up em uma estratégia individual de treino,
                acompanhamento e evolução.
              </p>
              <ul class="benefit-list">
                <li>Protocolo individual adaptado à sua rotina.</li>
                <li>Plataforma própria para acompanhar treino e evolução.</li>
                <li>Suporte humano para ajustes, cobrança e continuidade.</li>
                <li>Estratégia de progressão para energia, força e composição corporal.</li>
              </ul>
              <p class="micro"><strong>WhatsApp direto:</strong> (11) 9 2478-7933</p>
              <div class="cta-row">
                <a class="button primary" href="https://wa.me/${WHATSAPP_NUMBER}?text=${whatsappText}" target="_blank" rel="noreferrer" data-conversion="protocol">QUERO CONHECER MEU PROTOCOLO</a>
                <a class="button secondary" href="https://wa.me/${WHATSAPP_NUMBER}?text=${whatsappText}" target="_blank" rel="noreferrer" data-conversion="whatsapp">FALAR COM O TIME HERO</a>
              </div>
            </div>
          </article>
        </div>
      </div>
    </section>
  `;

  document.querySelectorAll("[data-conversion]").forEach((link) => {
    link.addEventListener("click", () => persistEvent(`click_${link.dataset.conversion}`, result));
  });
}

function metricMarkup(name, value) {
  return `
    <div class="metric">
      <div class="metric-head"><span>${name}</span><span>${value}/100</span></div>
      <div class="metric-track"><span style="--metric: ${value}%"></span></div>
    </div>
  `;
}

function renderLegal(type) {
  const pages = {
    privacy: {
      title: "Política de Privacidade",
      body:
        "Coletamos primeiro nome, WhatsApp, e-mail e respostas do check-up para liberar seu diagnóstico, enviar orientações relacionadas à sua performance e melhorar a experiência. Os dados podem ser integrados a ferramentas de CRM, automação e atendimento, sempre com finalidade compatível com a evolução solicitada por você.",
    },
    terms: {
      title: "Termos de Uso",
      body:
        "O Check-up de Performance HERO é uma ferramenta educativa e estratégica. As respostas geram uma análise inicial baseada em padrões de rotina, energia, consistência e percepção corporal. O uso da ferramenta não garante resultados específicos e não substitui acompanhamento profissional individual.",
    },
    health: {
      title: "Aviso de Saúde",
      body:
        "Este check-up não realiza diagnóstico médico, clínico, hormonal, nutricional ou psicológico. Antes de iniciar treinos, mudanças alimentares ou protocolos intensos, procure orientação de profissionais habilitados, especialmente em caso de sintomas, dores, condições pré-existentes ou uso de medicamentos.",
    },
  };
  const page = pages[type];
  screen.innerHTML = `
    <section class="workspace">
      <div class="quiz-frame">
        <article class="panel">
          <p class="question-label">Legal</p>
          <h2>${page.title}</h2>
          <p class="support">${page.body}</p>
          <div class="cta-row">
            <button class="button primary" type="button" id="backHome">Voltar ao início</button>
          </div>
        </article>
      </div>
    </section>
  `;
  document.querySelector("#backHome").addEventListener("click", renderLanding);
}

function renderAdmin() {
  const records = loadRecords();
  const leads = records.filter((record) => record.type === "lead_captured");
  const completed = records.filter((record) => record.type === "quiz_completed");
  const clicks = records.filter((record) => record.type.startsWith("click_"));
  const avg = completed.length
    ? Math.round(completed.reduce((sum, record) => sum + Number(record.payload.overall || 0), 0) / completed.length)
    : 0;

  screen.innerHTML = `
    <section class="workspace">
      <div class="admin-grid">
        <article class="panel">
          <p class="question-label">Admin MVP</p>
          <h2>Leads e conversões locais</h2>
          <p class="support">
            Este painel usa o armazenamento do navegador para validar o fluxo. Na próxima etapa, estes eventos entram em Supabase,
            CRM, WhatsApp API e webhooks.
          </p>
          <div class="stat-grid">
            <div class="stat"><strong>${leads.length}</strong><span>Leads</span></div>
            <div class="stat"><strong>${completed.length}</strong><span>Conclusões</span></div>
            <div class="stat"><strong>${avg}</strong><span>Índice médio</span></div>
            <div class="stat"><strong>${clicks.length}</strong><span>Cliques na oferta</span></div>
          </div>
          <div class="cta-row">
            <button class="button secondary" type="button" id="exportData">Exportar JSON</button>
            <button class="button secondary" type="button" id="clearData">Limpar dados locais</button>
          </div>
        </article>
        <div class="admin-table-wrap" style="margin-top: 18px">
          <table>
            <thead>
              <tr>
                <th>Data</th>
                <th>Evento</th>
                <th>Lead</th>
                <th>Perfil</th>
                <th>Índice</th>
                <th>Tags</th>
              </tr>
            </thead>
            <tbody>
              ${records.length ? records.slice().reverse().map(recordRow).join("") : `<tr><td colspan="6">Nenhum evento registrado ainda.</td></tr>`}
            </tbody>
          </table>
        </div>
      </div>
    </section>
  `;

  document.querySelector("#exportData").addEventListener("click", () => {
    const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement("a");
    anchor.href = url;
    anchor.download = "hero-checkup-leads.json";
    anchor.click();
    URL.revokeObjectURL(url);
  });

  document.querySelector("#clearData").addEventListener("click", () => {
    localStorage.removeItem(STORAGE_KEY);
    showToast("Dados locais apagados.");
    renderAdmin();
  });
}

function recordRow(record) {
  const payload = record.payload || {};
  const lead = record.lead || {};
  return `
    <tr>
      <td>${new Date(record.createdAt).toLocaleString("pt-BR")}</td>
      <td>${record.type}</td>
      <td>${lead.firstName || "-"}<br><span class="micro">${lead.email || ""}</span></td>
      <td>${record.profile || "-"}</td>
      <td>${payload.overall !== undefined && payload.overall !== null ? payload.overall : "-"}</td>
      <td>${(payload.tags || []).join(", ") || "-"}</td>
    </tr>
  `;
}

function persistEvent(type, payload) {
  const record = {
    type,
    createdAt: new Date().toISOString(),
    profile: state.profile,
    lead: state.lead,
    answers: state.answers,
    payload,
  };
  const records = loadRecords();
  records.push(record);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(records));

  // Future integrations: send this same record to Supabase, CRM, WhatsApp API or a webhook.
  if (integrations.webhookUrl) {
    fetch(integrations.webhookUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(record),
    }).catch(() => {});
  }
}

function notifyLeadCaptured(stage, payload) {
  const record = {
    firstName: state.lead.firstName || "",
    whatsapp: state.lead.whatsapp || "",
    email: state.lead.email || "",
    consent: state.lead.consent ? "sim" : "nao",
    profile: state.profile || "",
    stage,
    destinationEmail: LEAD_NOTIFICATION_EMAIL,
    pageUrl: location.href,
    createdAt: new Date().toISOString(),
    payload: payload || {},
  };

  submitNetlifyLeadForm(record).catch(() => {});
  submitLeadEmailFunction(record).catch(() => {});
}

async function submitNetlifyLeadForm(record) {
  const body = new URLSearchParams();
  body.set("form-name", "hero-lead");
  Object.entries(record).forEach(([key, value]) => {
    body.set(key, typeof value === "object" ? JSON.stringify(value) : String(value || ""));
  });

  await fetch("/", {
    method: "POST",
    headers: { "Content-Type": "application/x-www-form-urlencoded" },
    body: body.toString(),
    keepalive: true,
  });
}

async function submitLeadEmailFunction(record) {
  await fetch("/.netlify/functions/lead-email", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(record),
    keepalive: true,
  });
}

function loadRecords() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
  } catch {
    return [];
  }
}

function resetToLanding() {
  state.phase = "landing";
  renderLanding();
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.add("visible");
  window.clearTimeout(showToast.timer);
  showToast.timer = window.setTimeout(() => toast.classList.remove("visible"), 2600);
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

safeRender(boot);

</script>
